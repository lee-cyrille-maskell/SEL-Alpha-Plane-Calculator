<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEL Alpha Plane Test Tool</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <!-- HEADER / TOOLBAR -->
  <header class="toolbar">
    <div class="toolbar-left">
      <img src="/src/assets/plt-logo.jpg" alt="Power-Link Technologies" class="toolbar-logo" />
      <h1 class="toolbar-title">SEL Alpha Plane Test Tool</h1>
    </div>
    <div class="toolbar-actions">
      <button id="btn-new" title="New Project">New</button>
      <button id="btn-open" title="Open Project">Open</button>
      <button id="btn-save" title="Save Project">Save</button>
      <button id="btn-save-as" title="Save As...">Save As</button>
      <div class="toolbar-separator"></div>
      <button id="btn-undo" title="Undo (Ctrl+Z)">Undo</button>
      <button id="btn-redo" title="Redo (Ctrl+Y)">Redo</button>
      <div class="toolbar-separator"></div>
      <button id="btn-export-pdf" title="Export PDF Report">Export PDF</button>
      <button id="btn-export-csv" title="Export to CSV">Export CSV</button>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <div class="main-layout">
    <!-- LEFT PANEL: Settings -->
    <aside class="left-panel">
      <!-- Relay Settings -->
      <section class="panel-section">
        <div class="panel-header">Relay Settings</div>
        <div class="panel-body">
          <div class="form-row">
            <label for="lr87">87LR</label>
            <input type="number" id="lr87" step="0.1" min="0.1" value="6.0" />
          </div>
          <div class="form-row">
            <label for="lang87">87LANG (&deg;)</label>
            <input type="number" id="lang87" step="1" min="0" max="360" value="195" />
          </div>
          <div class="form-row">
            <label for="lpp87">87LPP (A)</label>
            <input type="number" id="lpp87" step="0.01" min="0" value="1.0" />
          </div>
          <div class="form-row">
            <label for="ct-local">CT Ratio Local</label>
            <input type="number" id="ct-local" step="1" min="1" value="1200" />
          </div>
          <div class="form-row">
            <label for="ct-remote">CT Ratio Remote</label>
            <input type="number" id="ct-remote" step="1" min="1" value="1200" />
          </div>
        </div>
      </section>

      <!-- Test Parameters -->
      <section class="panel-section">
        <div class="panel-header">Test Parameters</div>
        <div class="panel-body">
          <div class="form-row">
            <label for="ref-i-mag">Ref Current (A)</label>
            <input type="number" id="ref-i-mag" step="0.1" min="0" value="1.0" />
          </div>
          <div class="form-row">
            <label for="ref-i-ang">Ref Angle (&deg;)</label>
            <input type="number" id="ref-i-ang" step="1" value="0" />
          </div>
          <div class="form-row">
            <label for="frequency">Frequency (Hz)</label>
            <select id="frequency">
              <option value="50">50 Hz</option>
              <option value="60" selected>60 Hz</option>
            </select>
          </div>
          <div class="form-row">
            <label for="prefault-time">Prefault Time (s)</label>
            <input type="number" id="prefault-time" step="0.1" min="0" value="1.0" />
          </div>
          <div class="form-row">
            <label for="max-fault-time">Max Fault Time (s)</label>
            <input type="number" id="max-fault-time" step="0.1" min="0" value="5.0" />
          </div>
          <div class="form-row">
            <label for="delay-time">Delay Time (s)</label>
            <input type="number" id="delay-time" step="0.1" min="0" value="0.5" />
          </div>
          <div class="form-row">
            <label for="fault-type">Fault Type</label>
            <select id="fault-type">
              <option value="A">Phase A</option>
              <option value="B">Phase B</option>
              <option value="C">Phase C</option>
              <option value="3P" selected>3-Phase</option>
            </select>
          </div>
          <div class="form-row">
            <label for="tolerance">Alpha Tol. (%)</label>
            <input type="number" id="tolerance" step="1" min="0" value="5" />
          </div>
          <div class="form-row">
            <label for="diff-tol-pct">Diff Tol. (%)</label>
            <input type="number" id="diff-tol-pct" step="1" min="0" value="5" />
          </div>
          <div class="form-row">
            <label for="diff-tol-ma">Diff Tol. (mA)</label>
            <input type="number" id="diff-tol-ma" step="1" min="0" value="20" />
          </div>
        </div>
      </section>

      <!-- Report Info -->
      <section class="panel-section">
        <div class="panel-header">Report Info</div>
        <div class="panel-body">
          <div class="form-row">
            <label for="relay-type">Relay Type</label>
            <input type="text" id="relay-type" value="SEL-311L" />
          </div>
          <div class="form-row">
            <label for="manufacturer">Manufacturer</label>
            <input type="text" id="manufacturer" value="Schweitzer Engineering Laboratories" />
          </div>
          <div class="form-row">
            <label for="serial-number">Serial Number</label>
            <input type="text" id="serial-number" />
          </div>
          <div class="form-row">
            <label for="panel-designation">Panel Designation</label>
            <input type="text" id="panel-designation" />
          </div>
          <div class="form-row">
            <label for="tester-name">Tester Name</label>
            <input type="text" id="tester-name" />
          </div>
          <div class="form-row">
            <label for="test-date">Test Date</label>
            <input type="date" id="test-date" />
          </div>
          <div class="form-row">
            <label for="station">Station</label>
            <input type="text" id="station" />
          </div>
          <div class="form-row">
            <label for="comments">Comments</label>
            <textarea id="comments" rows="2"></textarea>
          </div>
        </div>
      </section>
    </aside>

    <!-- CENTER + RIGHT: Chart and Test Points -->
    <div class="right-area">
      <!-- Alpha Plane Chart -->
      <div class="chart-container">
        <div id="alpha-chart-wrapper">
          <div id="alpha-chart"></div>
          <button id="btn-reset-zoom" title="Reset zoom (double-click chart)">Reset</button>
          <div id="zoom-hint">Scroll: zoom &bull; Right-drag: pan &bull; Dbl-click: reset</div>
        </div>
      </div>

      <!-- Test Point Entry -->
      <div class="test-entry">
        <div class="panel-header">Add Test Point</div>
        <div class="test-entry-fields">
          <div class="form-row inline">
            <label for="entry-alpha-mag">Alpha Mag:</label>
            <input type="number" id="entry-alpha-mag" step="0.01" value="1.0" />
          </div>
          <div class="form-row inline">
            <label for="entry-alpha-ang">Alpha Angle (&deg;):</label>
            <input type="number" id="entry-alpha-ang" step="1" value="180" />
          </div>
          <button id="btn-add-point" class="btn-primary">Save Test Point</button>
        </div>
        <!-- Live preview of calculated currents -->
        <div id="live-preview" class="live-preview"></div>
      </div>

      <!-- Test Points List -->
      <div class="test-points-container">
        <div class="panel-header">
          Test Points
          <button id="btn-clear-all" class="btn-small btn-danger">Clear All</button>
        </div>
        <div id="test-points-list" class="test-points-list"></div>
      </div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <footer class="status-bar">
    <span id="status-file">No file open</span>
    <span id="status-info">Power-Link Technologies</span>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
